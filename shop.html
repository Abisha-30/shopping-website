<!DOCTYPE html>
<html>
<head>
    <title>Electronics Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header-color">
    <h1>Electronics Shop 🛒</h1>
</header>

<input type="text" id="search-box" placeholder="Search electronics..." onkeyup="searchItems()">

<script src="script.js"></script>
<script>
    loadProducts();
</script>

</body>
</html>
