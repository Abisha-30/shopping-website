<!DOCTYPE html>
<html>
<head>
    <title>My Electronic Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1> Electronic Shop 🛒</h1>
</header>

<!-- Search bar -->
<input type="text" id="search-box" placeholder="Search items..." onkeyup="searchItems()">

<!-- Product list -->
<div class="products" id="product-list"></div>

<!-- Cart -->
<div class="cart">
    <h2>Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
    <button onclick="checkout()">Checkout</button>
</div>

<script src="script.js"></script>
<script>
    // Load products when page opens
    loadProducts();
</script>
</body>
</html>
