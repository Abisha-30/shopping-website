<!DOCTYPE html>
<html>
<head>
    <title>Advanced Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Shop 🛒</h1>
</header>

<div class="products">

    <div class="product">
        <h3>Shirt</h3>
        <p>₹500</p>
        <button onclick="addToCart('Shirt', 500)">Add</button>
    </div>

    <div class="product">
        <h3>Shoes</h3>
        <p>₹1200</p>
        <button onclick="addToCart('Shoes', 1200)">Add</button>
    </div>

    <div class="product">
        <h3>Watch</h3>
        <p>₹800</p>
        <button onclick="addToCart('Watch', 800)">Add</button>
    </div>

</div>

<div class="cart">
    <h2>Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
</div>

<script src="script.js"></script>
</body>
</html>
